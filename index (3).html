const R = 52;
const VW = 880, VH = 580;

function edgePts(a, b) {
  const dx=b.cx-a.cx, dy=b.cy-a.cy, d=Math.sqrt(dx*dx+dy*dy);
  const ux=dx/d, uy=dy/d;
  return { x1:a.cx+ux*R, y1:a.cy+uy*R, x2:b.cx-ux*R, y2:b.cy-uy*R, mx:(a.cx+b.cx)/2, my:(a.cy+b.cy)/2 };
}

/* ── Draggable modal ─────────────────────────────────────────────────────── */
function AlcoholModal({ node, onClose }) {
  const [pos, setPos] = useState({ x: window.innerWidth/2 - 230, y: window.innerHeight/2 - 140 });
  const dragging = useRef(false);
  const origin   = useRef({});

  const onMouseDown = useCallback(e => {
    dragging.current = true;
    origin.current = { mx: e.clientX, my: e.clientY, px: pos.x, py: pos.y };
    e.preventDefault();
  }, [pos]);

  const onMouseMove = useCallback(e => {
    if (!dragging.current) return;
    setPos({ x: origin.current.px + e.clientX - origin.current.mx, y: origin.current.py + e.clientY - origin.current.my });
  }, []);

  const onMouseUp = useCallback(() => { dragging.current = false; }, []);

  return (
    <div style={{position:"fixed",inset:0,zIndex:1000,pointerEvents:"none"}} onMouseMove={onMouseMove} onMouseUp={onMouseUp}>
      <div style={{
        position:"absolute", left:pos.x, top:pos.y,
        width:460, background:"#fff",
        border:`2px solid ${node.color}`,
        borderRadius:12,
        boxShadow:`0 16px 60px ${node.color}25, 0 4px 16px rgba(0,0,0,0.10)`,
        pointerEvents:"all", userSelect:"none",
        fontFamily:"'DM Sans', sans-serif",
      }}>
        <div onMouseDown={onMouseDown} style={{
          background:node.color, padding:"12px 16px", borderRadius:"10px 10px 0 0",
          cursor:"grab", display:"flex", alignItems:"center", justifyContent:"space-between",
        }}>
          <div>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.7)",fontFamily:"'DM Mono',monospace",letterSpacing:".14em",textTransform:"uppercase",marginBottom:2}}>
              Nexo con Alcohol
            </div>
            <div style={{fontSize:14,fontWeight:700,color:"#fff",fontFamily:"'Syne',sans-serif"}}>
              {node.label.join(" ")}
            </div>
          </div>
          <button onClick={onClose} style={{
            background:"rgba(255,255,255,0.2)", border:"none", borderRadius:6,
            color:"#fff", cursor:"pointer", fontSize:18, fontWeight:700,
            width:30, height:30, display:"flex", alignItems:"center", justifyContent:"center",
          }}>×</button>
        </div>
        <div style={{padding:"18px 20px"}}>
          <p style={{margin:0, fontSize:13.5, color:"#333", lineHeight:1.85, fontFamily:"'DM Sans',sans-serif"}}>
            {node.alcohol}
          </p>
          <div style={{marginTop:14,fontSize:10,color:"#bbb",fontFamily:"'DM Mono',monospace",letterSpacing:".08em",textAlign:"right"}}>
            — arrastra para mover · × para cerrar
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Protein row ─────────────────────────────────────────────────────────── */
function ProteinRow({p, nodeColor}) {
  const dc = p.dir==="↑" ? "#0F9E55" : p.dir==="↓" ? "#D41A42" : "#999";
  return (
    <div style={{display:"flex",gap:8,alignItems:"flex-start",
      borderLeft:`2px solid ${nodeColor}`,paddingLeft:9,
      paddingTop:5,paddingBottom:5,marginBottom:2}}>
      <span style={{color:dc,fontWeight:700,fontSize:15,minWidth:16,flexShrink:0,
        fontFamily:"'DM Mono',monospace"}}>{p.dir}</span>
      <div style={{flex:1,minWidth:0}}>
        <span style={{fontSize:12,fontWeight:600,color:nodeColor,fontFamily:"'DM Mono',monospace"}}>{p.gene}</span>
        {(p.logFC!==null||p.pval!==null) && (
          <span style={{fontSize:10,color:"#bbb",fontFamily:"'DM Mono',monospace",marginLeft:8}}>
            {p.logFC!==null?`logFC ${p.logFC>0?"+":""}${p.logFC}`:""}
            {p.logFC!==null&&p.pval!==null?" · ":""}
            {p.pval!==null?`p=${p.pval}`:""}
          </span>
        )}
        <div style={{fontSize:11.5,color:"#777",lineHeight:1.45,marginTop:2,fontFamily:"'DM Sans',sans-serif"}}>{p.note}</div>
      </div>
    </div>
  );
}

/* ── Main App ────────────────────────────────────────────────────────────── */
function App() {
  const [sel, setSel]         = useState(null);
  const [tab, setTab]         = useState("males");
  const [showAlc, setShowAlc] = useState(false);

  const node        = sel ? NODES[sel] : null;
  const activeEdges = sel ? EDGES.filter(e=>e.from===sel||e.to===sel) : [];
  const connected   = new Set(activeEdges.flatMap(e=>[e.from,e.to]));

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#ffffff",color:"#111",overflow:"hidden",fontFamily:"'DM Sans',sans-serif"}}>
      <style>{`
        * { box-sizing:border-box; }
        ::-webkit-scrollbar{width:5px}
        ::-webkit-scrollbar-thumb{background:#e8e8e8;border-radius:3px}
        .nd{cursor:pointer;transition:opacity .18s}
        .tb{cursor:pointer;border:1.5px solid #e0e0e0;background:#fff;color:#888;
            font-size:11px;padding:7px 16px;border-radius:20px;
            font-family:'DM Mono',monospace;letter-spacing:.05em;transition:all .15s;font-weight:500}
        .tb:hover{color:#333;border-color:#bbb;background:#f8f8f8}
        .tb.on{background:#111;color:#fff;border-color:#111;font-weight:600}
        .ab{cursor:pointer;border:1.5px solid #C98500;background:#fff;color:#C98500;
            font-size:11px;padding:7px 16px;border-radius:20px;
            font-family:'DM Mono',monospace;letter-spacing:.06em;text-transform:uppercase;
            transition:all .15s;font-weight:600}
        .ab:hover,.ab.on{background:#C9850012}
        .nc{cursor:pointer;border:1.5px solid #f0f0f0;border-radius:8px;padding:10px 12px;
            background:#fafafa;transition:all .15s}
        .nc:hover{border-color:inherit;background:#f5f5f5}
        @keyframes pulse{0%,100%{opacity:.45}50%{opacity:.88}}
        .hub{animation:pulse 3.5s ease-in-out infinite}
      `}</style>

      {/* ── HEADER ──────────────────────────────────────────────────────── */}
      <div style={{
        borderBottom:"1.5px solid #f0f0f0", padding:"14px 28px",
        display:"flex", alignItems:"center", gap:20,
        flexShrink:0, background:"#fff",
      }}>
        <div>
          <div style={{fontSize:10,color:"#ccc",fontFamily:"'DM Mono',monospace",letterSpacing:".2em",textTransform:"uppercase",marginBottom:3}}>
            Mapa Interactivo · Hipocampo
          </div>
          <h1 style={{margin:0,fontSize:18,fontWeight:800,color:"#111",fontFamily:"'Syne',sans-serif",letterSpacing:"-.01em"}}>
            Desregulación Proteómica por Alcohol
          </h1>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
          {[["7","vías"],["11","conexiones"],["2","sexos"]].map(([n,l])=>(
            <div key={l} style={{
              background:"#f5f5f5", border:"1px solid #e8e8e8",
              borderRadius:20, padding:"4px 12px",
              display:"flex", alignItems:"center", gap:5,
            }}>
              <span style={{fontSize:13,fontWeight:700,color:"#111",fontFamily:"'Syne',sans-serif"}}>{n}</span>
              <span style={{fontSize:10,color:"#aaa",fontFamily:"'DM Mono',monospace",letterSpacing:".05em"}}>{l}</span>
            </div>
          ))}
        </div>
      </div>

      {/* ── BODY ────────────────────────────────────────────────────────── */}
      <div style={{display:"flex",flex:1,minHeight:0}}>

        {/* MAP */}
        <div style={{flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
          padding:"12px 8px 12px 12px",borderRight:"1.5px solid #f0f0f0",
          background:"#fdfdfd",overflowX:"auto"}}>
          <svg viewBox={`0 0 ${VW} ${VH}`} width={VW} height={VH} style={{display:"block"}}>
            <defs>
              {EDGES.map((e,i)=>(
                <marker key={i} id={`a${i}`} markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
                  <path d="M0,0.5 L0,5.5 L7.5,3z" fill={e.color}/>
                </marker>
              ))}
              {Object.values(NODES).map(n=>(
                <radialGradient key={n.id} id={`g${n.id}`} cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stopColor={n.color} stopOpacity=".14"/>
                  <stop offset="100%" stopColor={n.color} stopOpacity=".02"/>
                </radialGradient>
              ))}
            </defs>

            {/* Edges — uniform 2px, pill label backgrounds */}
            {EDGES.map((e,i)=>{
              const a=NODES[e.from], b=NODES[e.to];
              const p=edgePts(a,b);
              const active=activeEdges.includes(e);
              const dim=sel&&!active;
              const lw = p.label ? p.label.length * 5.5 + 16 : 0;
              return (
                <g key={i} opacity={dim?.06:active?1:.38}>
                  <line x1={p.x1} y1={p.y1} x2={p.x2} y2={p.y2}
                    stroke={e.color} strokeWidth={2}
                    strokeDasharray={active?"none":"5,4"}
                    markerEnd={`url(#a${i})`}/>
                  {active&&(
                    <g>
                      <rect x={p.mx - lw/2} y={p.my-18} width={lw} height={16}
                        rx={8} fill="white" stroke={e.color} strokeWidth="1.2" opacity=".95"/>
                      <text x={p.mx} y={p.my-7} textAnchor="middle" fontSize="9"
                        fill={e.color} style={{fontFamily:"'DM Mono',monospace",fontWeight:600}}>
                        {e.label}
                      </text>
                    </g>
                  )}
                </g>
              );
            })}

            {/* Alcohol hub */}
            <g className="hub">
              <circle cx={430} cy={310} r={36} fill="#FFF9EC"
                stroke="#C98500" strokeWidth="1.8"/>
              <text x={430} y={306} textAnchor="middle" fontSize="11"
                fill="#C98500" style={{fontFamily:"'DM Mono',monospace",letterSpacing:".14em",fontWeight:600}}>EtOH</text>
              <text x={430} y={321} textAnchor="middle" fontSize="8.5"
                fill="#a06800" style={{fontFamily:"'DM Mono',monospace",letterSpacing:".1em"}}>ALCOHOL</text>
            </g>

            {/* Nodes — all solid borders, unified style */}
            {Object.values(NODES).map(n=>{
              const isSel=sel===n.id;
              const dim=sel&&!connected.has(n.id);
              return (
                <g key={n.id} className="nd" opacity={dim?.14:1}
                  onClick={()=>{setSel(sel===n.id?null:n.id);setTab("males");setShowAlc(false);}}>
                  {isSel&&<circle cx={n.cx} cy={n.cy} r={R+14} fill="none"
                    stroke={n.color} strokeWidth="2" opacity=".3"/>}
                  <circle cx={n.cx} cy={n.cy} r={R} fill={`url(#g${n.id})`}/>
                  {/* solid border, same weight all, thicker when selected */}
                  <circle cx={n.cx} cy={n.cy} r={R} fill="none"
                    stroke={n.color} strokeWidth={isSel?3:1.8}/>
                  {/* abbr — primary label, full opacity */}
                  <text x={n.cx} y={n.cy-7}
                    textAnchor="middle" fontSize="12" fill={n.color}
                    style={{fontFamily:"'DM Mono',monospace",fontWeight:600,letterSpacing:".03em"}}>
                    {n.abbr}
                  </text>
                  {/* subtitle — reduced opacity for hierarchy */}
                  {n.label.map((l,li)=>(
                    <text key={li} x={n.cx} y={n.cy+9+(li*12)}
                      textAnchor="middle" fontSize="8" fill={n.color}
                      style={{fontFamily:"'DM Mono',monospace",opacity:.45,letterSpacing:".02em"}}>
                      {l}
                    </text>
                  ))}
                </g>
              );
            })}
          </svg>
        </div>

        {/* DETAIL PANEL */}
        <div style={{flex:1,minWidth:270,overflowY:"auto",padding:"20px 22px",display:"flex",flexDirection:"column",gap:14}}>

          {!node ? (
            <div>
              <p style={{fontSize:12,color:"#bbb",fontStyle:"italic",lineHeight:1.75,marginBottom:20}}>
                Selecciona un nodo para ver proteínas desreguladas, logFC, p-valores y nexo con el alcohol.
              </p>
              <p style={{fontSize:9,color:"#ccc",fontFamily:"'DM Mono',monospace",letterSpacing:".14em",textTransform:"uppercase",marginBottom:12}}>
                Vías del mapa
              </p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {Object.values(NODES).map(n=>(
                  <div key={n.id} className="nc" style={{borderColor:`${n.color}35`}}
                    onClick={()=>{setSel(n.id);setTab("males");setShowAlc(false);}}
                    onMouseEnter={e=>{ e.currentTarget.style.background=`${n.color}0C`; e.currentTarget.style.borderColor=n.color+"60"; }}
                    onMouseLeave={e=>{ e.currentTarget.style.background="#fafafa"; e.currentTarget.style.borderColor=`${n.color}35`; }}>
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
                      <div style={{width:9,height:9,borderRadius:"50%",background:n.color,flexShrink:0}}/>
                      <span style={{fontSize:11,color:n.color,fontWeight:700,fontFamily:"'Syne',sans-serif"}}>
                        {n.label.join(" ")}
                      </span>
                    </div>
                    <p style={{margin:0,fontSize:10,color:"#999",lineHeight:1.45}}>
                      {n.desc.slice(0,72)}…
                    </p>
                  </div>
                ))}
              </div>
            </div>
          ) : (
            <>
              <div style={{paddingBottom:14,borderBottom:"1.5px solid #f0f0f0"}}>
                <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:6}}>
                  <div style={{width:11,height:11,borderRadius:"50%",background:node.color,flexShrink:0}}/>
                  <h2 style={{margin:0,fontSize:17,color:node.color,fontWeight:800,fontFamily:"'Syne',sans-serif"}}>
                    {node.label.join(" ")}
                  </h2>
                </div>
                <p style={{margin:0,fontSize:12,color:"#888",lineHeight:1.6}}>
                  {node.desc}
                </p>
              </div>

              <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
                <button className={`tb ${tab==="males"?"on":""}`} onClick={()=>setTab("males")}>
                  ♂ Machos ({node.males.length})
                </button>
                <button className={`tb ${tab==="females"?"on":""}`} onClick={()=>setTab("females")}>
                  ♀ Hembras ({node.females.length})
                </button>
                <button className={`ab ${showAlc?"on":""}`} style={{marginLeft:"auto"}}
                  onClick={()=>setShowAlc(!showAlc)}>
                  Nexo alcohol
                </button>
              </div>

              <div style={{display:"flex",flexDirection:"column",gap:1}}>
                {(tab==="males"?node.males:node.females).map((p,i)=>(
                  <ProteinRow key={i} p={p} nodeColor={node.color}/>
                ))}
              </div>

              <div>
                <p style={{margin:"0 0 9px",fontSize:9,color:"#ccc",fontFamily:"'DM Mono',monospace",letterSpacing:".12em",textTransform:"uppercase"}}>
                  Vías conectadas
                </p>
                {EDGES.filter(e=>e.from===sel||e.to===sel).map((e,i)=>{
                  const otherId=e.from===sel?e.to:e.from;
                  const other=NODES[otherId];
                  const dir=e.from===sel?"→":"←";
                  return (
                    <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:7,cursor:"pointer"}}
                      onClick={()=>{setSel(otherId);setTab("males");setShowAlc(false);}}>
                      <div style={{width:7,height:7,borderRadius:"50%",background:e.color,flexShrink:0}}/>
                      <span style={{fontSize:12,color:e.color,fontFamily:"'DM Mono',monospace",fontWeight:600}}>{dir}</span>
                      <span style={{fontSize:13,color:other.color,fontWeight:700,fontFamily:"'Syne',sans-serif"}}>{other.label.join(" ")}</span>
                      <span style={{fontSize:11,color:"#bbb"}}>· {e.label}</span>
                    </div>
                  );
                })}
              </div>

              <button onClick={()=>{setSel(null);setShowAlc(false);}}
                style={{
                  alignSelf:"flex-start", background:"#fff",
                  border:"2px solid #e0e0e0", color:"#444",
                  padding:"12px 32px", cursor:"pointer",
                  fontFamily:"'Syne',sans-serif", fontSize:14, fontWeight:700,
                  borderRadius:8, letterSpacing:".01em", marginTop:4,
                  transition:"all .15s",
                }}
                onMouseEnter={e=>{e.target.style.background="#f5f5f5";e.target.style.borderColor="#bbb";}}
                onMouseLeave={e=>{e.target.style.background="#fff";e.target.style.borderColor="#e0e0e0";}}
              >
                ← Volver al mapa
              </button>
            </>
          )}
        </div>
      </div>

      {/* ── FOOTER / LEGEND ──────────────────────────────────────────────── */}
      <div style={{
        borderTop:"1.5px solid #f0f0f0", padding:"10px 28px",
        display:"flex", gap:24, alignItems:"center", flexShrink:0, background:"#fff",
      }}>
        {[
          {dir:"↑", label:"sobreexpresado", color:"#0F9E55"},
          {dir:"↓", label:"infraexpresado",  color:"#D41A42"},
          {dir:"~", label:"fosfoproteómica", color:"#aaa"},
        ].map(({dir,label,color})=>(
          <div key={dir} style={{display:"flex",alignItems:"center",gap:7}}>
            <span style={{fontSize:16,fontWeight:700,color,fontFamily:"'DM Mono',monospace",lineHeight:1}}>{dir}</span>
            <span style={{fontSize:11,color:"#aaa",fontFamily:"'DM Sans',sans-serif"}}>{label}</span>
          </div>
        ))}
        <span style={{marginLeft:"auto",fontSize:10,color:"#ccc",fontFamily:"'DM Mono',monospace",letterSpacing:".06em"}}>
          clic en nodo → detalle · clic de nuevo → deseleccionar
        </span>
      </div>

      {showAlc && node && <AlcoholModal node={node} onClose={()=>setShowAlc(false)}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
