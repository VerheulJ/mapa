const R=52,VW=880,VH=580;

function edgePts(a,b){
  const dx=b.cx-a.cx,dy=b.cy-a.cy,d=Math.sqrt(dx*dx+dy*dy),ux=dx/d,uy=dy/d;
  return{x1:a.cx+ux*R,y1:a.cy+uy*R,x2:b.cx-ux*R,y2:b.cy-uy*R,mx:(a.cx+b.cx)/2,my:(a.cy+b.cy)/2};
}

/* ── Draggable Alcohol Modal ─────────────────────────────────────────────── */
function AlcoholModal({node,onClose}){
  const[pos,setPos]=useState({x:window.innerWidth/2-230,y:window.innerHeight/2-130});
  const drag=useRef(false),orig=useRef({});
  const down=useCallback(e=>{drag.current=true;orig.current={mx:e.clientX,my:e.clientY,px:pos.x,py:pos.y};e.preventDefault();},[pos]);
  const move=useCallback(e=>{if(!drag.current)return;setPos({x:orig.current.px+e.clientX-orig.current.mx,y:orig.current.py+e.clientY-orig.current.my});},[]);
  const up=useCallback(()=>{drag.current=false;},[]);
  return(
    <div style={{position:"fixed",inset:0,zIndex:1000,pointerEvents:"none"}} onMouseMove={move} onMouseUp={up}>
      <div style={{position:"absolute",left:pos.x,top:pos.y,width:460,background:"#fff",
        border:`2px solid ${node.color}`,borderRadius:10,
        boxShadow:`0 20px 60px ${node.color}20,0 4px 20px rgba(0,0,0,0.08)`,
        pointerEvents:"all",userSelect:"none"}}>
        <div onMouseDown={down} style={{background:node.color,padding:"11px 16px",borderRadius:"8px 8px 0 0",
          cursor:"grab",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.65)",fontFamily:"'Roboto Mono',monospace",
              letterSpacing:".15em",textTransform:"uppercase",marginBottom:2}}>Nexo con Alcohol</div>
            <div style={{fontSize:14,fontWeight:700,color:"#fff",letterSpacing:"-.01em"}}>{node.label.join(" ")}</div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.18)",border:"none",borderRadius:5,
            color:"#fff",cursor:"pointer",fontSize:18,fontWeight:700,width:28,height:28,
            display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>
        <div style={{padding:"18px 20px 20px"}}>
          <p style={{margin:0,fontSize:13.5,color:"#333",lineHeight:1.85,fontWeight:300}}>{node.alcohol}</p>
          <div style={{marginTop:12,fontSize:9,color:"#ccc",fontFamily:"'Roboto Mono',monospace",

/* ── Protein row ─────────────────────────────────────────────────────────── */
function ProteinRow({p,nodeColor}){
  const isUp=p.dir==="↑",isDown=p.dir==="↓";
  const bgDir=isUp?"#E8F8EE":isDown?"#FDEAEA":"#F5F5F5";
  const fgDir=isUp?"#0A7A3A":isDown?"#B01030":"#777";
  return(
    <div style={{display:"flex",gap:10,alignItems:"flex-start",
      padding:"7px 0 7px 10px",borderLeft:`2px solid ${nodeColor}`,marginBottom:1}}>
      <span style={{background:bgDir,color:fgDir,fontWeight:700,fontSize:12,
        fontFamily:"'Roboto Mono',monospace",padding:"1px 6px",borderRadius:4,
        flexShrink:0,marginTop:1,minWidth:28,textAlign:"center"}}>{p.dir}</span>
      <div style={{flex:1,minWidth:0}}>
        <span style={{fontSize:13,fontWeight:700,color:"#111",fontFamily:"'Roboto Mono',monospace",
          letterSpacing:"-.01em"}}>{p.gene}</span>
        {(p.logFC!==null||p.pval!==null)&&(
          <span style={{fontSize:10,color:"#bbb",fontFamily:"'Roboto Mono',monospace",marginLeft:8,fontWeight:400}}>
            {p.logFC!==null?`${p.logFC>0?"+":""}${p.logFC}`:""}
            {p.logFC!==null&&p.pval!==null?" · ":""}
            {p.pval!==null?`p=${p.pval}`:""}
          </span>
        )}
        <div style={{fontSize:11.5,color:"#888",lineHeight:1.45,marginTop:2,fontWeight:300}}>{p.note}</div>
      </div>
    </div>
  );
}

const Div=()=><div style={{height:1,background:"rgba(0,0,0,0.07)",margin:"14px 0"}}/>;

/* ── Main App ────────────────────────────────────────────────────────────── */
function App(){
  const[sel,setSel]=useState(null);
  const[tab,setTab]=useState("males");
  const[showAlc,setShowAlc]=useState(false);
  const[showRefs,setShowRefs]=useState(false);
  const[showAbout,setShowAbout]=useState(false);

  const node=sel?NODES[sel]:null;
  const activeEdges=sel?EDGES.filter(e=>e.from===sel||e.to===sel):[];
  const connected=new Set(activeEdges.flatMap(e=>[e.from,e.to]));
  const connectedEdges=node?EDGES.filter(e=>e.from===sel||e.to===sel):[];

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#fff",
      color:"#111",overflow:"hidden",fontFamily:"'Roboto',sans-serif",fontWeight:400}}>
      <style>{`
        *{box-sizing:border-box}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#e4e4e4;border-radius:3px}
        .nd{cursor:pointer;transition:opacity .18s}
        .tb{cursor:pointer;border:1.5px solid #ddd;background:#f9f7f5;color:#777;
            font-size:11px;padding:7px 18px;border-radius:20px;font-family:'Roboto',sans-serif;
            font-weight:500;letter-spacing:.01em;transition:all .15s}
        .tb:hover{background:#f0ede9;border-color:#bbb;color:#333}
        .tb.on{background:#111;color:#fff;border-color:#111;font-weight:600}
        .ab{cursor:pointer;background:#f5f5f5;border:1.5px solid #e0e0e0;color:#555;
            font-size:11px;padding:7px 16px;border-radius:20px;font-family:'Roboto Mono',monospace;
            letter-spacing:.06em;text-transform:uppercase;font-weight:500;transition:all .15s}
        .ab:hover{background:#ececec;border-color:#bbb}
        .ab.on{background:#111;color:#fff;border-color:#111}
        .hdr-btn{cursor:pointer;border:1.5px solid #e0e0e0;background:#fff;color:#555;
            font-size:11px;padding:6px 14px;border-radius:20px;font-family:'Roboto',sans-serif;
            font-weight:500;letter-spacing:.01em;transition:all .15s}
        .hdr-btn:hover{background:#f5f5f5;border-color:#aaa;color:#222}
        .nc{cursor:pointer;border:1.5px solid #efefef;border-radius:8px;padding:10px 12px;
            background:#fafafa;transition:all .15s}
        @keyframes pulse{0%,100%{opacity:.45}50%{opacity:.9}}
        .hub{animation:pulse 3.5s ease-in-out infinite}
        .back-btn{background:#fff;border:1.5px solid #e0e0e0;color:#555;padding:8px 20px;
            border-radius:6px;cursor:pointer;font-family:'Roboto',sans-serif;font-size:13px;
            font-weight:500;letter-spacing:.01em;transition:all .15s;display:inline-flex;
            align-items:center;gap:6px;width:100%}
        .back-btn:hover{background:#f5f5f5;border-color:#aaa;color:#222}
      `}</style>

      {/* ── HEADER ─────────────────────────────────────────────────────── */}
      <div style={{borderBottom:"1px solid rgba(0,0,0,0.1)",padding:"12px 28px",
        display:"flex",alignItems:"center",gap:16,flexShrink:0,background:"#fff"}}>
        <div>
          <div style={{fontSize:9,color:"#bbb",fontFamily:"'Roboto Mono',monospace",
            letterSpacing:".2em",textTransform:"uppercase",marginBottom:3}}>
            Mapa Interactivo · Hipocampo
          </div>
          <h1 style={{margin:0,fontSize:19,fontWeight:700,color:"#111",letterSpacing:"-.02em",lineHeight:1.1}}>
            Desregulación Proteómica por Alcohol
          </h1>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:7,alignItems:"center"}}>
          {[["7","vías","#EEF3FB"],["11","conexiones","#F0EBF9"],["2","sexos","#F0F9F3"]].map(([n,l,bg])=>(
            <div key={l} style={{background:bg,border:"1px solid rgba(0,0,0,0.08)",borderRadius:20,
              padding:"5px 13px",display:"flex",alignItems:"center",gap:5}}>
              <span style={{fontSize:13,fontWeight:700,color:"#111",fontFamily:"'Roboto Mono',monospace"}}>{n}</span>
              <span style={{fontSize:10,color:"#888",letterSpacing:".04em"}}>{l}</span>
            </div>
          ))}
          <div style={{width:1,height:20,background:"#e8e8e8",margin:"0 4px"}}/>
          <button className="hdr-btn" onClick={()=>setShowRefs(true)}>Referencias</button>
          <button className="hdr-btn" onClick={()=>setShowAbout(true)}>Contacto</button>
        </div>
      </div>

      {/* ── BODY ───────────────────────────────────────────────────────── */}
      <div style={{display:"flex",flex:1,minHeight:0}}>

        {/* MAP */}
        <div style={{flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
          padding:"12px 8px 12px 12px",borderRight:"1px solid rgba(0,0,0,0.15)",
          background:"#fdfcfb",overflowX:"auto"}}>
          <svg viewBox={`0 0 ${VW} ${VH}`} width={VW} height={VH} style={{display:"block"}}>
            <defs>
              {EDGES.map((e,i)=>(
                <marker key={i} id={`a${i}`} markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
                  <path d="M0,0.5 L0,5.5 L7.5,3z" fill={e.color}/>
                </marker>
              ))}
              {Object.values(NODES).map(n=>(
                <radialGradient key={n.id} id={`g${n.id}`} cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stopColor={n.color} stopOpacity=".13"/>
                  <stop offset="100%" stopColor={n.color} stopOpacity=".02"/>
                </radialGradient>
              ))}
            </defs>
            {EDGES.map((e,i)=>{
              const a=NODES[e.from],b=NODES[e.to],p=edgePts(a,b);
              const active=activeEdges.includes(e),dim=sel&&!active;
              const lw=e.label.length*5.4+18;
              return(
                <g key={i} opacity={dim?.06:active?1:.38}>
                  <line x1={p.x1} y1={p.y1} x2={p.x2} y2={p.y2}
                    stroke={e.color} strokeWidth={2}
                    strokeDasharray={active?"none":"5,4"}
                    markerEnd={`url(#a${i})`}/>
                  {active&&(
                    <g>
                      <rect x={p.mx-lw/2} y={p.my-17} width={lw} height={15}
                        rx={7.5} fill="white" stroke={e.color} strokeWidth="1.2" opacity=".96"/>
                      <text x={p.mx} y={p.my-6.5} textAnchor="middle" fontSize="8.5"
                        fill={e.color} style={{fontFamily:"'Roboto Mono',monospace",fontWeight:600}}>
                        {e.label}
                      </text>
                    </g>
                  )}
                </g>
              );
            })}
            <g className="hub">
              <circle cx={430} cy={310} r={36} fill="#FFFBF0" stroke="#C47F00" strokeWidth="1.8"/>
              <text x={430} y={306} textAnchor="middle" fontSize="11" fill="#C47F00"
                style={{fontFamily:"'Roboto Mono',monospace",letterSpacing:".14em",fontWeight:600}}>EtOH</text>
              <text x={430} y={321} textAnchor="middle" fontSize="8.5" fill="#9a6200"
                style={{fontFamily:"'Roboto Mono',monospace",letterSpacing:".1em"}}>ALCOHOL</text>
            </g>
            {Object.values(NODES).map(n=>{
              const isSel=sel===n.id,dim=sel&&!connected.has(n.id);
              return(
                <g key={n.id} className="nd" opacity={dim?.13:1}
                  onClick={()=>{setSel(sel===n.id?null:n.id);setTab("males");setShowAlc(false);}}>
                  {isSel&&<circle cx={n.cx} cy={n.cy} r={R+14} fill="none" stroke={n.color} strokeWidth="2" opacity=".25"/>}
                  <circle cx={n.cx} cy={n.cy} r={R} fill={`url(#g${n.id})`}/>
                  <circle cx={n.cx} cy={n.cy} r={R} fill="none" stroke={n.color} strokeWidth={isSel?3:1.8}/>
                  <text x={n.cx} y={n.cy-7} textAnchor="middle" fontSize="12" fill={n.color}
                    style={{fontFamily:"'Roboto Mono',monospace",fontWeight:600,letterSpacing:".02em"}}>
                    {n.abbr}
                  </text>
                  {n.label.map((l,li)=>(
                    <text key={li} x={n.cx} y={n.cy+9+(li*12)} textAnchor="middle"
                      fontSize="7.5" fill={n.color}
                      style={{fontFamily:"'Roboto Mono',monospace",opacity:.40,letterSpacing:".02em"}}>
                      {l}
                    </text>
                  ))}
                </g>
              );
            })}
          </svg>
        </div>

        {/* ── DETAIL PANEL — flex column with scrollable middle ────────── */}
        <div style={{flex:1,minWidth:280,display:"flex",flexDirection:"column",overflow:"hidden"}}>

          {!node?(
            /* No selection — full scroll */
            <div style={{flex:1,overflowY:"auto",padding:"22px 24px"}}>
              <p style={{fontSize:12.5,color:"#aaa",fontStyle:"italic",lineHeight:1.75,marginBottom:22,fontWeight:300}}>
                Selecciona un nodo para explorar proteínas desreguladas, logFC, p-valores y nexo con el alcohol.
              </p>
              <div style={{fontSize:9,color:"#bbb",fontFamily:"'Roboto Mono',monospace",
                letterSpacing:".16em",textTransform:"uppercase",marginBottom:14}}>Vías del mapa</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
                {Object.values(NODES).map(n=>(
                  <div key={n.id} className="nc" style={{borderColor:`${n.color}30`}}
                    onClick={()=>{setSel(n.id);setTab("males");setShowAlc(false);}}
                    onMouseEnter={e=>{e.currentTarget.style.background=`${n.color}0A`;e.currentTarget.style.borderColor=`${n.color}55`;}}
                    onMouseLeave={e=>{e.currentTarget.style.background="#fafafa";e.currentTarget.style.borderColor=`${n.color}30`;}}>
                    <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
                      <div style={{width:8,height:8,borderRadius:"50%",background:n.color,flexShrink:0}}/>
                      <span style={{fontSize:11.5,color:n.color,fontWeight:700,letterSpacing:"-.01em"}}>{n.label.join(" ")}</span>
                    </div>
                    <p style={{margin:0,fontSize:10.5,color:"#999",lineHeight:1.45,fontWeight:300}}>
                      {n.desc.slice(0,70)}…
                    </p>
                  </div>
                ))}
              </div>
            </div>
          ):(
            <>
              {/* TOP: node title + tabs — fixed */}
              <div style={{flexShrink:0,padding:"18px 24px 0",borderBottom:"1px solid rgba(0,0,0,0.07)"}}>
                <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:5}}>
                  <div style={{width:10,height:10,borderRadius:"50%",background:node.color,flexShrink:0}}/>
                  <h2 style={{margin:0,fontSize:17,color:node.color,fontWeight:700,letterSpacing:"-.02em"}}>
                    {node.label.join(" ")}
                  </h2>
                </div>
                <p style={{margin:"0 0 14px",fontSize:12,color:"#888",lineHeight:1.6,fontWeight:300}}>{node.desc}</p>
                <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap",paddingBottom:14}}>
                  <button className={`tb ${tab==="males"?"on":""}`} onClick={()=>setTab("males")}>
                    ♂ Machos ({node.males.length})
                  </button>
                  <button className={`tb ${tab==="females"?"on":""}`} onClick={()=>setTab("females")}>
                    ♀ Hembras ({node.females.length})
                  </button>
                  <button className={`ab ${showAlc?"on":""}`} style={{marginLeft:"auto"}}
                    onClick={()=>setShowAlc(!showAlc)}>
                    Nexo alcohol
                  </button>
                </div>
              </div>

              {/* MIDDLE: protein list — scrollable */}
              <div style={{flex:1,overflowY:"auto",padding:"12px 24px 8px"}}>
                {(tab==="males"?node.males:node.females).map((p,i)=>(
                  <ProteinRow key={i} p={p} nodeColor={node.color}/>
                ))}
              </div>

              {/* BOTTOM: connected pathways + back — fixed */}
              <div style={{flexShrink:0,borderTop:"1px solid rgba(0,0,0,0.07)",
                padding:"14px 24px 16px",background:"#fff"}}>
                <div style={{fontSize:9,color:"#bbb",fontFamily:"'Roboto Mono',monospace",
                  letterSpacing:".16em",textTransform:"uppercase",marginBottom:10}}>
                  Vías conectadas
                </div>
                {connectedEdges.map((e,i)=>{
                  const otherId=e.from===sel?e.to:e.from;
                  const other=NODES[otherId];
                  const dir=e.from===sel?"→":"←";
                  return(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:8,
                      marginBottom:7,cursor:"pointer"}}
                      onClick={()=>{setSel(otherId);setTab("males");setShowAlc(false);}}>
                      <div style={{width:7,height:7,borderRadius:"50%",background:e.color,flexShrink:0}}/>
                      <span style={{fontSize:12,color:e.color,fontFamily:"'Roboto Mono',monospace",
                        fontWeight:600,flexShrink:0}}>{dir}</span>
                      <span style={{fontSize:13,color:other.color,fontWeight:700,flexShrink:0,
                        letterSpacing:"-.01em"}}>{other.label.join(" ")}</span>
                      <span style={{fontSize:11,color:"#bbb",fontWeight:300,overflow:"hidden",
                        textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.label}</span>
                    </div>
                  );
                })}
                <div style={{height:1,background:"rgba(0,0,0,0.07)",margin:"12px 0"}}/>
                <button className="back-btn" onClick={()=>{setSel(null);setShowAlc(false);}}>
                  <span style={{fontSize:14,lineHeight:1}}>←</span>
                  <span>Volver al mapa</span>
                </button>
              </div>
            </>
          )}
        </div>
      </div>

      {/* ── FOOTER / LEGEND ────────────────────────────────────────────── */}
      <div style={{borderTop:"1px solid rgba(0,0,0,0.1)",padding:"11px 28px",
        display:"flex",gap:24,alignItems:"center",flexShrink:0,background:"#fff"}}>
        {[
          {dir:"↑",label:"Sobreexpresado",bg:"#E8F8EE",fg:"#0A7A3A"},
          {dir:"↓",label:"Infraexpresado",bg:"#FDEAEA",fg:"#B01030"},
          {dir:"~",label:"Fosfoproteómica",bg:"#F3F3F3",fg:"#777"},
        ].map(({dir,label,bg,fg})=>(
          <div key={dir} style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{background:bg,color:fg,fontWeight:700,fontSize:13,
              fontFamily:"'Roboto Mono',monospace",padding:"2px 8px",borderRadius:5,lineHeight:1.4}}>
              {dir}
            </span>
            <span style={{fontSize:12,color:"#888",fontWeight:400}}>{label}</span>
          </div>
        ))}
        <span style={{marginLeft:"auto",fontSize:10,color:"#ccc",fontFamily:"'Roboto Mono',monospace",
          letterSpacing:".05em"}}>clic en nodo → detalle</span>
      </div>

      {showAlc&&node&&<AlcoholModal node={node} onClose={()=>setShowAlc(false)}/>}
      {showRefs&&<RefsModal onClose={()=>setShowRefs(false)}/>}
      {showAbout&&<AboutModal onClose={()=>setShowAbout(false)}/>}
    </div>
  );
}
