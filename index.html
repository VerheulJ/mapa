const R = 52;
const VW = 880, VH = 580;

function edgePts(a, b) {
  const dx=b.cx-a.cx, dy=b.cy-a.cy, d=Math.sqrt(dx*dx+dy*dy);
  const ux=dx/d, uy=dy/d;
  return { x1:a.cx+ux*R, y1:a.cy+uy*R, x2:b.cx-ux*R, y2:b.cy-uy*R, mx:(a.cx+b.cx)/2, my:(a.cy+b.cy)/2 };
}

function ProteinRow({p, nodeColor}) {

      borderLeft:`2px solid ${nodeColor}`,paddingLeft:8,
      paddingTop:4,paddingBottom:4,marginBottom:2}}>
      <span style={{color:dc,fontWeight:700,fontSize:14,minWidth:14,flexShrink:0,
        fontFamily:"'IBM Plex Mono',monospace"}}>{p.dir}</span>
      <div style={{flex:1,minWidth:0}}>
        <span style={{fontSize:12,fontWeight:600,color:nodeColor,
          fontFamily:"'IBM Plex Mono',monospace"}}>{p.gene}</span>
        {(p.logFC!==null||p.pval!==null) && (
          <span style={{fontSize:10,color:"#555",fontFamily:"'IBM Plex Mono',monospace",marginLeft:8}}>
            {p.logFC!==null?`logFC ${p.logFC>0?"+":""}${p.logFC}`:""}
            {p.logFC!==null&&p.pval!==null?" · ":""}
            {p.pval!==null?`p=${p.pval}`:""}
          </span>
        )}
        <div style={{fontSize:11,color:"#888",lineHeight:1.4,marginTop:1,
          fontFamily:"'IBM Plex Sans',sans-serif"}}>{p.note}</div>
      </div>
    </div>
  );
}

function App() {
  const [sel, setSel]         = useState(null);
  const [tab, setTab]         = useState("males");
  const [showAlc, setShowAlc] = useState(false);

  const node        = sel ? NODES[sel] : null;
  const activeEdges = sel ? EDGES.filter(e=>e.from===sel||e.to===sel) : [];
  const connected   = new Set(activeEdges.flatMap(e=>[e.from,e.to]));

  const mono = "'IBM Plex Mono', monospace";
  const sans = "'IBM Plex Sans', sans-serif";

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",
      background:"#0a0b10",color:"#ddd8cc",fontFamily:sans,overflow:"hidden"}}>

      <style>{`
        *{box-sizing:border-box}
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-thumb{background:#202130;border-radius:2px}
        .nd{cursor:pointer;transition:opacity .15s}
        .tb{cursor:pointer;border:1px solid #2a2b3a;background:transparent;color:#666;
            font-size:10px;padding:5px 14px;border-radius:2px;font-family:'IBM Plex Mono',monospace;
            letter-spacing:.07em;transition:all .15s}
        .tb:hover{color:#ccc;border-color:#555}
        .tb.on{background:#141520;color:#ddd8cc;border-color:#555}
        .ab{cursor:pointer;border:1px solid #ffbe0066;background:transparent;color:#ffbe00;
            font-size:10px;padding:5px 13px;border-radius:2px;font-family:'IBM Plex Mono',monospace;
            letter-spacing:.07em;text-transform:uppercase;transition:all .15s}
        .ab:hover,.ab.on{background:#ffbe0018;border-color:#ffbe00}
        .nc{cursor:pointer;border:1px solid #1e1f2e;border-radius:3px;padding:8px 10px;transition:background .12s}
        @keyframes pulse{0%,100%{opacity:.4}50%{opacity:.85}}
        .hub{animation:pulse 3.5s ease-in-out infinite}
      `}</style>

      {/* HEADER */}
      <div style={{borderBottom:"1px solid #151620",padding:"9px 22px",
        display:"flex",alignItems:"center",gap:14,flexShrink:0}}>
        <span style={{fontSize:9,color:"#333",fontFamily:mono,letterSpacing:".22em",textTransform:"uppercase"}}>
          Mapa Interactivo
        </span>
        <h1 style={{margin:0,fontSize:14,fontWeight:500,color:"#ddd8cc",fontFamily:sans}}>
          Desregulación Proteómica · Alcohol · Hipocampo
        </h1>
        <span style={{marginLeft:"auto",fontSize:9,color:"#333",fontFamily:mono}}>
          7 vías · 11 conexiones · dimorfismo sexual
        </span>
      </div>

      {/* BODY */}
      <div style={{display:"flex",flex:1,minHeight:0}}>

        {/* MAP */}
        <div style={{flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
          padding:"10px 8px 10px 12px",borderRight:"1px solid #151620",overflowX:"auto"}}>
          <svg viewBox={`0 0 ${VW} ${VH}`} width={VW} height={VH} style={{display:"block"}}>
            <defs>
              {EDGES.map((e,i)=>(
                <marker key={i} id={`a${i}`} markerWidth="7" markerHeight="7" refX="5" refY="2.5" orient="auto">
                  <path d="M0,0L0,5L7,2.5z" fill={e.color}/>
                </marker>
              ))}
              {Object.values(NODES).map(n=>(
                <radialGradient key={n.id} id={`g${n.id}`} cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stopColor={n.color} stopOpacity=".30"/>
                  <stop offset="100%" stopColor={n.color} stopOpacity=".05"/>
                </radialGradient>
              ))}
            </defs>

            {/* Edges */}
            {EDGES.map((e,i)=>{
              const a=NODES[e.from], b=NODES[e.to];
              const p=edgePts(a,b);
              const active=activeEdges.includes(e);
              const dim=sel&&!active;
              return (
                <g key={i} opacity={dim?.06:active?1:.35}>
                  <line x1={p.x1} y1={p.y1} x2={p.x2} y2={p.y2}
                    stroke={e.color} strokeWidth={active?2.2:1.2}
                    strokeDasharray={active?"none":"5,4"}
                    markerEnd={`url(#a${i})`}/>
                  {active&&(
                    <text x={p.mx} y={p.my-7} textAnchor="middle" fontSize="9"
                      fill={e.color} style={{fontFamily:mono}}>
                      {e.label}
                    </text>
                  )}
                </g>
              );
            })}

            {/* Alcohol hub */}
            <g className="hub">
              <circle cx={430} cy={310} r={34} fill="none"
                stroke="#ffbe00" strokeWidth="1.2" strokeDasharray="3,4"/>
              <text x={430} y={306} textAnchor="middle" fontSize="10"
                fill="#ffbe00" style={{fontFamily:mono,letterSpacing:".16em"}}>EtOH</text>
              <text x={430} y={321} textAnchor="middle" fontSize="8"
                fill="#cc9800" style={{fontFamily:mono,letterSpacing:".1em"}}>ALCOHOL</text>
            </g>

            {/* Nodes */}
            {Object.values(NODES).map(n=>{
              const isSel=sel===n.id;
              const dim=sel&&!connected.has(n.id);
              return (
                <g key={n.id} className="nd" opacity={dim?.15:1}
                  onClick={()=>{setSel(sel===n.id?null:n.id);setTab("males");setShowAlc(false);}}>
                  {isSel&&<circle cx={n.cx} cy={n.cy} r={R+13} fill="none"
                    stroke={n.color} strokeWidth="1.5" opacity=".5"/>}
                  <circle cx={n.cx} cy={n.cy} r={R} fill={`url(#g${n.id})`}/>
                  <circle cx={n.cx} cy={n.cy} r={R} fill="none"
                    stroke={n.color} strokeWidth={isSel?2.5:1.8}
                    strokeOpacity={isSel?1:.85}/>
                  <text x={n.cx} y={n.cy-8}
                    textAnchor="middle" fontSize="11.5" fill={n.color}
                    style={{fontFamily:mono,fontWeight:600,letterSpacing:".04em"}}>
                    {n.abbr}
                  </text>
                  {n.label.map((l,li)=>(
                    <text key={li} x={n.cx} y={n.cy+9+(li*12)}
                      textAnchor="middle" fontSize="8" fill={n.color}
                      style={{fontFamily:mono,opacity:.7,letterSpacing:".02em"}}>
                      {l}
                    </text>
                  ))}
                </g>
              );
            })}
          </svg>
        </div>

        {/* DETAIL PANEL */}
        <div style={{flex:1,minWidth:260,overflowY:"auto",padding:"16px 18px",
          display:"flex",flexDirection:"column",gap:10}}>

          {!node ? (
            <div>
              <p style={{fontSize:11,color:"#444",fontStyle:"italic",lineHeight:1.7,
                marginBottom:16,fontFamily:sans}}>
                Selecciona un nodo para ver proteínas desreguladas, logFC, p-valores y nexo con el alcohol.
              </p>
              <p style={{fontSize:9,color:"#333",fontFamily:mono,letterSpacing:".14em",
                textTransform:"uppercase",marginBottom:10}}>Vías del mapa</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                {Object.values(NODES).map(n=>(
                  <div key={n.id} className="nc"
                    style={{background:`${n.color}10`,borderColor:`${n.color}40`}}
                    onClick={()=>{setSel(n.id);setTab("males");setShowAlc(false);}}
                    onMouseEnter={e=>e.currentTarget.style.background=`${n.color}20`}
                    onMouseLeave={e=>e.currentTarget.style.background=`${n.color}10`}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                      <div style={{width:7,height:7,borderRadius:"50%",background:n.color,flexShrink:0}}/>
                      <span style={{fontSize:10,color:n.color,fontWeight:600,fontFamily:mono}}>
                        {n.label.join(" ")}
                      </span>
                    </div>
                    <p style={{margin:0,fontSize:10,color:"#555",lineHeight:1.4,fontFamily:sans}}>
                      {n.desc.slice(0,72)}…
                    </p>
                  </div>
                ))}
              </div>
            </div>
          ) : (
            <>
              <div style={{display:"flex",alignItems:"flex-start",gap:10,paddingBottom:10,
                borderBottom:"1px solid #151620"}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:node.color,
                  marginTop:4,flexShrink:0}}/>
                <div>
                  <h2 style={{margin:"0 0 4px",fontSize:14,color:node.color,fontWeight:600,fontFamily:mono}}>
                    {node.label.join(" ")}
                  </h2>
                  <p style={{margin:0,fontSize:11,color:"#666",lineHeight:1.5,fontFamily:sans}}>
                    {node.desc}
                  </p>
                </div>
              </div>

              <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                <button className={`tb ${tab==="males"?"on":""}`} onClick={()=>setTab("males")}>
                  ♂ Machos ({node.males.length})
                </button>
                <button className={`tb ${tab==="females"?"on":""}`} onClick={()=>setTab("females")}>
                  ♀ Hembras ({node.females.length})
                </button>
                <button className={`ab ${showAlc?"on":""}`} style={{marginLeft:"auto"}}
                  onClick={()=>setShowAlc(!showAlc)}>
                  Nexo alcohol
                </button>
              </div>

              <div style={{display:"flex",flexDirection:"column",gap:1}}>
                {(tab==="males"?node.males:node.females).map((p,i)=>(
                  <ProteinRow key={i} p={p} nodeColor={node.color}/>
                ))}
              </div>

              {showAlc&&(
                <div style={{background:"#161208",border:`1px solid ${node.color}44`,
                  borderRadius:3,padding:"11px 13px"}}>
                  <p style={{margin:"0 0 6px",fontSize:9,color:node.color,fontFamily:mono,
                    letterSpacing:".12em",textTransform:"uppercase"}}>Nexo con alcohol</p>
                  <p style={{margin:0,fontSize:11,color:"#888",lineHeight:1.7,fontFamily:sans}}>
                    {node.alcohol}
                  </p>
                </div>
              )}

              <div>
                <p style={{margin:"0 0 7px",fontSize:9,color:"#333",fontFamily:mono,
                  letterSpacing:".12em",textTransform:"uppercase"}}>Vías conectadas</p>
                {EDGES.filter(e=>e.from===sel||e.to===sel).map((e,i)=>{
                  const otherId=e.from===sel?e.to:e.from;
                  const other=NODES[otherId];
                  const dir=e.from===sel?"→":"←";
                  return (
                    <div key={i} style={{display:"flex",alignItems:"center",gap:7,
                      marginBottom:5,cursor:"pointer"}}
                      onClick={()=>{setSel(otherId);setTab("males");setShowAlc(false);}}>
                      <div style={{width:6,height:6,borderRadius:"50%",
                        background:e.color,flexShrink:0}}/>
                      <span style={{fontSize:11,color:e.color,fontFamily:mono}}>{dir}</span>
                      <span style={{fontSize:12,color:other.color,fontWeight:600,fontFamily:mono}}>
                        {other.label.join(" ")}
                      </span>
                      <span style={{fontSize:10,color:"#555",fontFamily:sans}}>· {e.label}</span>
                    </div>
                  );
                })}
              </div>

              <button onClick={()=>setSel(null)}
                style={{alignSelf:"flex-start",background:"transparent",
                  border:"1px solid #2a2b3a",color:"#555",padding:"5px 12px",
                  cursor:"pointer",fontFamily:mono,fontSize:10,
                  borderRadius:2,letterSpacing:".07em"}}>
                ← Volver
              </button>
            </>
          )}
        </div>
      </div>

      {/* FOOTER */}
      <div style={{borderTop:"1px solid #151620",padding:"5px 22px",display:"flex",
        gap:18,alignItems:"center",flexShrink:0}}>
        <span style={{fontSize:9,color:"#333",fontFamily:mono}}>
          <span style={{color:"#30e87880"}}>↑</span> sobreexpresado &nbsp;·&nbsp;
          <span style={{color:"#ff505080"}}>↓</span> infraexpresado &nbsp;·&nbsp;
          <span style={{color:"#66666660"}}>~</span> fosfoproteómica
        </span>
        <span style={{marginLeft:"auto",fontSize:9,color:"#333",fontFamily:mono}}>
          clic en nodo → detalle · clic de nuevo → deseleccionar
        </span>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
